<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workspace Dufrio - Hub Modernizado Codex</title>
  <meta name="description" content="Hub modernizado e limpo de ferramentas Dufrio.">
  <meta name="theme-color" content="#050505">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Instrument+Serif:ital,wght@0,400;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="assets/codex-modern/codex-modern.css">
</head>
<body>
  <a class="skip-link" href="#toolsBoard">Ir para ferramentas</a>

  <div class="aurora aurora-1" aria-hidden="true"></div>
  <div class="aurora aurora-2" aria-hidden="true"></div>
  <div class="aurora aurora-3" aria-hidden="true"></div>

  <main class="dashboard-container">
    <header class="header">
      <div class="header-text">
        <p class="header-kicker">Workspace Dufrio</p>
        <h1>Hub de Ferramentas</h1>
        <p>Central de acesso para câmara fria, ar-condicionado e rotinas comerciais.</p>
      </div>

      <a class="logo-container" href="./" aria-label="Abrir hub oficial atual">
        <img src="img/logo_dufrio.jpg" alt="Dufrio" loading="eager">
      </a>
    </header>

    <section class="command-panel" aria-label="Busca e filtros">
      <label class="search-field" for="toolSearch">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><path d="M20 20l-4-4"></path></svg>
        <input id="toolSearch" type="search" autocomplete="off" placeholder="Buscar ferramenta, loja ou rotina">
      </label>

      <div class="segment-control" id="segmentControl" aria-label="Filtrar ferramentas"></div>
    </section>

    <div class="status-line">
      <span><span class="status-dot" aria-hidden="true"></span>Sistemas operacionais e online</span>
      <span id="resultCount">Carregando ferramentas...</span>
    </div>

    <section class="tools-board" id="toolsBoard" aria-live="polite"></section>
    <div class="empty-state" id="emptyState" hidden>Nenhuma ferramenta encontrada.</div>

    <footer class="meta-footer">
      <div>
        <strong>Última atualização</strong>
        <span id="lastUpdate">Hub sincronizado com o projeto.</span>
      </div>
      <a href="https://github.com/crftwoo/thiago.luz.dufrio">Ver no GitHub</a>
    </footer>
  </main>

  <script src="ultimo_log.js" defer></script>
  <script src="assets/codex-modern/codex-modern.js" defer></script>
</body>
</html>
